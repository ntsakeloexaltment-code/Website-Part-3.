<section class="header text-center">
    <div>
        <h1>Book an Appointment</h1>
        <p>Schedule your beauty session with us</p>
    </div>
</section>

<section class="section">
    <div class="container">
        <h2 class="text-center mb-4">Appointment Form</h2>

        <form id="bookingForm">
            <div class="row">
                

                <div class="col-md-6 mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" required>
                </div>


                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" required>
                </div>


                <div class="col-md-6 mb-3">
                    <label class="form-label">Select Service</label>
                    <select class="form-control" required>
                        <option value="">Choose a service</option>
                        <option>Facial Treatment</option>
                        <option>Skincare Treatment</option>
                        <option>Beauty Enhancement</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Appointment Date</label>
                    <input type="date" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Preferred Time</label>
                    <input type="time" class="form-control" required>
                </div>

                <div class="col-12 mb-3">
                    <label class="form-label">Additional Notes</label>
                    <textarea class="form-control" rows="4"></textarea>
                </div>

            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-custom px-5">Book Now</button>
            </div>
        </form>

        <div id="successMessage" class="alert alert-success mt-4 text-center d-none">
            ✅ Your appointment has been successfully booked!
        </div>

    </div>
</section>
